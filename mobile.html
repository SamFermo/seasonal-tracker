<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Remy · San Fermo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: 'DM Sans', sans-serif;
      overflow-x: clip;
      min-height: 100dvh;
    }

    /* ── HEADER ── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #222;
      padding: 12px 16px 10px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .app-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem;
      color: #f0f0f0;
      letter-spacing: -0.3px;
    }
    .app-sub { font-size: 0.75rem; color: #555; margin-left: 6px; }
    .app-date { font-size: 0.72rem; color: #555; }

    /* ── PRICE MOVES STRIP ── */
    .moves-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 16px;
      scrollbar-width: none;
      border-bottom: 1px solid #1a1a1a;
    }
    .moves-strip::-webkit-scrollbar { display: none; }
    .move-chip {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      background: #151515;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 5px 10px;
      font-size: 0.78rem;
      white-space: nowrap;
    }
    .move-chip.up { border-color: rgba(220,53,69,0.3); }
    .move-chip.down { border-color: rgba(122,154,122,0.3); }
    .move-arrow { font-size: 0.7rem; font-weight: 700; }
    .move-chip.up .move-arrow { color: #e05; }
    .move-chip.down .move-arrow { color: #7a9a7a; }
    .move-pct { font-weight: 600; }
    .move-chip.up .move-pct { color: #e05; }
    .move-chip.down .move-pct { color: #7a9a7a; }
    .move-name { color: #bbb; }
    .move-price { color: #666; font-size: 0.72rem; }

    /* ── VENDOR PILLS ── */
    .vendor-pills {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 10px 16px;
      scrollbar-width: none;
      border-bottom: 1px solid #1a1a1a;
    }
    .vendor-pills::-webkit-scrollbar { display: none; }
    .pill {
      flex-shrink: 0;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      border: 1px solid #2a2a2a;
      background: #111;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pill.active {
      background: #1e2a1e;
      border-color: #4a6a4a;
      color: #9abf9a;
    }

    /* ── MAIN CONTENT ── */
    .content { padding: 0 0 120px; }

    /* ── SIGNAL SECTIONS ── */
    .signal-section { border-bottom: 1px solid #181818; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 12px;
      cursor: pointer;
      user-select: none;
    }
    .section-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #777;
      flex: 1;
    }
    .section-count {
      font-size: 0.72rem;
      color: #555;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 1px 7px;
    }
    .section-chevron {
      font-size: 0.6rem;
      color: #444;
      transition: transform 0.2s;
    }
    .signal-section.collapsed .section-chevron { transform: rotate(-90deg); }
    .signal-section.collapsed .cards-wrap { display: none; }

    /* signal dot colors */
    .dot-new { background: #5a9a6a; }
    .dot-peak { background: #7a9a7a; }
    .dot-available { background: #4a6a8a; }
    .dot-fading { background: #8a7a4a; }

    /* ── CARDS ── */
    .cards-wrap { padding: 0 12px 12px; }
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 11px 12px;
      position: relative;
      overflow: hidden;
    }
    .card.hidden-vendor { display: none; }
    .card-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: #e8e8e8;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .card-vendor {
      font-size: 0.72rem;
      color: #666;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-note {
      font-size: 0.72rem;
      color: #888;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 7px;
    }
    .badge {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.02em;
    }
    .badge-cat {
      background: #1e1e1e;
      color: #666;
      border: 1px solid #2a2a2a;
      text-transform: uppercase;
    }
    .badge-up {
      background: rgba(220,53,69,0.12);
      color: #e05;
      border: 1px solid rgba(220,53,69,0.2);
    }
    .badge-down {
      background: rgba(122,154,122,0.12);
      color: #7a9a7a;
      border: 1px solid rgba(122,154,122,0.2);
    }
    .card-price {
      font-size: 0.7rem;
      color: #555;
      margin-top: 5px;
    }

    /* ── FULL VIEW BUTTON ── */
    .full-view-fab {
      position: fixed;
      bottom: calc(20px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      background: #1a2a1a;
      border: 1px solid #3a5a3a;
      color: #9abf9a;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 11px 28px;
      border-radius: 24px;
      cursor: pointer;
      letter-spacing: 0.03em;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      transition: all 0.2s;
    }
    .full-view-fab:active { transform: translateX(-50%) scale(0.97); }

    /* ── FULL VIEW SHEET ── */
    .full-view-sheet {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      flex-direction: column;
      background: #0e0e0e;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .full-view-sheet.open { transform: translateY(0); }

    .sheet-header {
      display: flex;
      align-items: center;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #222;
      gap: 12px;
      flex-shrink: 0;
    }
    .sheet-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: #f0f0f0;
      flex: 1;
    }
    .sheet-close {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #888;
      width: 32px; height: 32px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sheet-search-wrap {
      padding: 10px 16px;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }
    .sheet-search {
      width: 100%;
      background: #151515;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e8e8e8;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      padding: 9px 12px;
      outline: none;
    }
    .sheet-search::placeholder { color: #444; }
    .sheet-search:focus { border-color: #3a5a3a; }

    .sheet-month-header {
      display: grid;
      grid-template-columns: 1fr 38px 38px 38px;
      gap: 0;
      padding: 6px 16px;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }
    .sheet-month-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #444;
      text-align: center;
    }
    .sheet-month-label.current { color: #7a9a7a; }

    .sheet-list {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .sheet-row {
      display: grid;
      grid-template-columns: 1fr 38px 38px 38px;
      align-items: center;
      padding: 9px 16px;
      border-bottom: 1px solid #141414;
      gap: 0;
    }
    .sheet-row.hidden-search { display: none; }
    .sheet-row.hidden-vendor { display: none; }
    .sheet-row-name {
      font-size: 0.85rem;
      font-weight: 500;
      color: #ddd;
      padding-right: 8px;
    }
    .sheet-row-vendor {
      font-size: 0.68rem;
      color: #555;
      margin-top: 2px;
    }
    .month-cell {
      width: 30px;
      height: 22px;
      border-radius: 4px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 700;
    }
    .month-cell.s0 { background: #1a1a1a; }
    .month-cell.s1 { background: #2d4a2d; }
    .month-cell.s2 { background: #4a7a4a; }
    .month-cell.s3 {
      background: repeating-linear-gradient(
        45deg, #2d4a2d, #2d4a2d 3px, #1a2a1a 3px, #1a2a1a 6px
      );
    }
    .month-cell.s4 { background: #1a2a1a; border: 1px dashed #2d4a2d; }
    .month-cell.current-month { outline: 1px solid #5a8a5a; outline-offset: 1px; }

    /* ── EMPTY STATE ── */
    .empty-state {
      padding: 24px 16px;
      text-align: center;
      color: #444;
      font-size: 0.85rem;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>

  <header class="app-header">
    <div>
      <span class="app-title">Remy</span>
      <span class="app-sub">San Fermo</span>
    </div>
    <span class="app-date" id="appDate"></span>
  </header>

  <div class="moves-strip" id="movesStrip"></div>
  <div class="vendor-pills" id="vendorPills"></div>

  <div class="content" id="mainContent">
    <div class="signal-section" id="secNew">
      <div class="section-header" onclick="toggleSection('secNew')">
        <div class="section-dot dot-new"></div>
        <span class="section-label">New This Month</span>
        <span class="section-count" id="countNew">0</span>
        <span class="section-chevron">▼</span>
      </div>
      <div class="cards-wrap"><div class="cards-grid" id="cardsNew"></div></div>
    </div>

    <div class="signal-section" id="secPeak">
      <div class="section-header" onclick="toggleSection('secPeak')">
        <div class="section-dot dot-peak"></div>
        <span class="section-label">Peak Season</span>
        <span class="section-count" id="countPeak">0</span>
        <span class="section-chevron">▼</span>
      </div>
      <div class="cards-wrap"><div class="cards-grid" id="cardsPeak"></div></div>
    </div>

    <div class="signal-section" id="secAvail">
      <div class="section-header" onclick="toggleSection('secAvail')">
        <div class="section-dot dot-available"></div>
        <span class="section-label">In Season</span>
        <span class="section-count" id="countAvail">0</span>
        <span class="section-chevron">▼</span>
      </div>
      <div class="cards-wrap"><div class="cards-grid" id="cardsAvail"></div></div>
    </div>

    <div class="signal-section" id="secFading">
      <div class="section-header" onclick="toggleSection('secFading')">
        <div class="section-dot dot-fading"></div>
        <span class="section-label">Ending Soon</span>
        <span class="section-count" id="countFading">0</span>
        <span class="section-chevron">▼</span>
      </div>
      <div class="cards-wrap"><div class="cards-grid" id="cardsFading"></div></div>
    </div>
  </div>

  <button class="full-view-fab" onclick="openFullView()">Full View ↑</button>

  <!-- FULL VIEW SHEET -->
  <div class="full-view-sheet" id="fullViewSheet">
    <div class="sheet-header">
      <span class="sheet-title">All Ingredients</span>
      <button class="sheet-close" onclick="closeFullView()">✕</button>
    </div>
    <div class="sheet-search-wrap">
      <input class="sheet-search" id="sheetSearch" type="search" placeholder="Search ingredients…" oninput="filterSheet()">
    </div>
    <div class="sheet-month-header">
      <div></div>
      <div class="sheet-month-label" id="mhPrev"></div>
      <div class="sheet-month-label current" id="mhCurr"></div>
      <div class="sheet-month-label" id="mhNext"></div>
    </div>
    <div class="sheet-list" id="sheetList"></div>
  </div>

    const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const VENDOR_SHORT = {
      'Foraged & Found Edibles': 'F&F',
      'Local Roots Farm': 'Local Roots',
      'Farmstand Local Foods': 'Farmstand',
      'Franks Quality Produce': 'Franks',
      'Key City Fish': 'Key City',
      'Preserve Meat': 'Preserve',
      'Sea Breeze Farm / Magic Meat Truck': 'Sea Breeze',
      'Swan House Farms': 'Swan House',
      'EC Wilson': 'EC Wilson',
    };

    let activeVendors = new Set(['all']);
    const currentMonth = new Date().getMonth();
    const prevMonth = (currentMonth + 11) % 12;
    const nextMonth = (currentMonth + 1) % 12;

    function vendorShort(v) { return VENDOR_SHORT[v] || v; }

    function getTrend(name) {
      const trends = DATA.trends || {};
      const t = trends[name];
      if (!t || t.trend_30d_pct == null) return null;
      return t;
    }

    function isNewThisMonth(ing) {
      const m = ing.months || [];
      const prev = m[prevMonth] || 0;
      const curr = m[currentMonth] || 0;
      return curr > 0 && (prev === 0 || prev === 4);
    }

    function getSignal(ing) {
      const m = ing.months || [];
      const curr = m[currentMonth] || 0;
      const next = m[nextMonth] || 0;
      if (curr === 0) return null;
      if (isNewThisMonth(ing)) return 'new';
      if (curr === 3 || (curr > 0 && next === 0)) return 'fading';
      if (curr === 2) return 'peak';
      if (curr === 1) return 'available';
      return null;
    }

    function buildMoveChip(name, t) {
      const up = t.trend_30d_pct > 0;
      const pct = Math.abs(t.trend_30d_pct).toFixed(0);
      const price = t.latest_price != null ? `$${t.latest_price}/${t.unit || 'unit'}` : '';
      return `<div class="move-chip ${up ? 'up' : 'down'}">
        <span class="move-arrow">${up ? '▲' : '▼'}</span>
        <span class="move-pct">${up ? '+' : '-'}${pct}%</span>
        <span class="move-name">${name}</span>
        <span class="move-price">${price}</span>
      </div>`;
    }

    function buildCard(ing) {
      const trend = getTrend(ing.name);
      const shortV = vendorShort(ing.vendor || '');
      const notes = Array.isArray(ing.notes) ? ing.notes.join(' ') : (ing.notes || '');
      const noteSnip = notes.length > 80 ? notes.slice(0, 78) + '…' : notes;
      let badges = `<span class="badge badge-cat">${ing.category || ''}</span>`;
      if (trend && trend.trend_30d_pct != null) {
        const up = trend.trend_30d_pct > 0;
        const pct = Math.abs(trend.trend_30d_pct).toFixed(0);
        badges += `<span class="badge ${up ? 'badge-up' : 'badge-down'}">${up ? '▲' : '▼'}${pct}%</span>`;
      }
      const priceHtml = ing.price_range ? `<div class="card-price">${ing.price_range.slice(0,50)}${ing.price_range.length > 50 ? '…' : ''}</div>` : '';
      return `<div class="card" data-vendor="${ing.vendor || ''}">
        <div class="card-name">${ing.name}</div>
        <div class="card-vendor">${shortV}</div>
        ${noteSnip ? `<div class="card-note">${noteSnip}</div>` : ''}
        <div class="card-badges">${badges}</div>
        ${priceHtml}
      </div>`;
    }

    function renderSignals() {
      const ingredients = DATA.ingredients || [];
      const buckets = { new: [], peak: [], available: [], fading: [] };

      ingredients.forEach(ing => {
        const sig = getSignal(ing);
        if (sig && buckets[sig]) buckets[sig].push(ing);
      });

      const sections = [
        { id: 'New', bucket: 'new' },
        { id: 'Peak', bucket: 'peak' },
        { id: 'Avail', bucket: 'available' },
        { id: 'Fading', bucket: 'fading' },
      ];
      sections.forEach(({ id, bucket }) => {
        const grid = document.getElementById(`cards${id}`);
        const count = document.getElementById(`count${id}`);
        const items = buckets[bucket];
        count.textContent = items.length;
        grid.innerHTML = items.length
          ? items.map(buildCard).join('')
          : `<div class="empty-state">None active</div>`;
      });

      // Collapse In Season by default (it's the longest)
      document.getElementById('secAvail').classList.add('collapsed');
      document.getElementById('secPeak').classList.add('collapsed');
    }

    function renderPriceMoves() {
      const trends = DATA.trends || {};
      const strip = document.getElementById('movesStrip');
      const moves = Object.entries(trends)
        .filter(([, t]) => t.trend_30d_pct != null && Math.abs(t.trend_30d_pct) >= 10)
        .sort((a, b) => Math.abs(b[1].trend_30d_pct) - Math.abs(a[1].trend_30d_pct));
      strip.innerHTML = moves.length
        ? moves.map(([name, t]) => buildMoveChip(name, t)).join('')
        : '<div style="font-size:0.78rem;color:#444;padding:2px 0">No significant price moves</div>';
    }

    function renderVendorPills() {
      const ingredients = DATA.ingredients || [];
      const vendors = [...new Set(ingredients.map(i => i.vendor).filter(Boolean))].sort();
      const pills = document.getElementById('vendorPills');
      pills.innerHTML = `<button class="pill active" data-vendor="all" onclick="toggleVendor('all', this)">All</button>`
        + vendors.map(v => `<button class="pill" data-vendor="${v}" onclick="toggleVendor('${v}', this)">${vendorShort(v)}</button>`).join('');
    }

    function toggleVendor(v, btn) {
      if (v === 'all') {
        activeVendors = new Set(['all']);
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
      } else {
        activeVendors.delete('all');
        document.querySelector('.pill[data-vendor="all"]').classList.remove('active');
        if (btn.classList.contains('active')) {
          btn.classList.remove('active');
          activeVendors.delete(v);
          if (activeVendors.size === 0) {
            activeVendors.add('all');
            document.querySelector('.pill[data-vendor="all"]').classList.add('active');
          }
        } else {
          btn.classList.add('active');
          activeVendors.add(v);
        }
      }
      applyVendorFilter();
      filterSheet();
    }

    function applyVendorFilter() {
      document.querySelectorAll('.card').forEach(card => {
        const v = card.dataset.vendor;
        card.classList.toggle('hidden-vendor', !activeVendors.has('all') && !activeVendors.has(v));
      });
    }

    function toggleSection(id) {
      document.getElementById(id).classList.toggle('collapsed');
    }

    /* ── FULL VIEW ── */
    function buildSheetList() {
      const ingredients = DATA.ingredients || [];
      const list = document.getElementById('sheetList');
      const sorted = [...ingredients].sort((a, b) => {
        const sigOrder = { new: 0, peak: 1, available: 2, fading: 3 };
        const sa = sigOrder[getSignal(a)] ?? 4;
        const sb = sigOrder[getSignal(b)] ?? 4;
        return sa !== sb ? sa - sb : a.name.localeCompare(b.name);
      });
      list.innerHTML = sorted.map(ing => {
        const pM = ing.months?.[prevMonth] ?? 0;
        const cM = ing.months?.[currentMonth] ?? 0;
        const nM = ing.months?.[nextMonth] ?? 0;
        const trend = getTrend(ing.name);
        const tBadge = trend?.trend_30d_pct != null
          ? `<span style="font-size:0.65rem;color:${trend.trend_30d_pct > 0 ? '#e05' : '#7a9a7a'}">${trend.trend_30d_pct > 0 ? '▲' : '▼'}${Math.abs(trend.trend_30d_pct).toFixed(0)}%</span>` : '';
        return `<div class="sheet-row" data-vendor="${ing.vendor || ''}" data-name="${ing.name.toLowerCase()}">
          <div>
            <div class="sheet-row-name">${ing.name} ${tBadge}</div>
            <div class="sheet-row-vendor">${vendorShort(ing.vendor || '')}</div>
          </div>
          <div class="month-cell s${pM}"></div>
          <div class="month-cell s${cM} current-month"></div>
          <div class="month-cell s${nM}"></div>
        </div>`;
      }).join('');
    }

    function openFullView() {
      buildSheetList();
      filterSheet();
      document.getElementById('fullViewSheet').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeFullView() {
      document.getElementById('fullViewSheet').classList.remove('open');
      document.body.style.overflow = '';
    }

    function filterSheet() {
      const q = (document.getElementById('sheetSearch').value || '').toLowerCase();
      document.querySelectorAll('.sheet-row').forEach(row => {
        const nameMatch = !q || row.dataset.name.includes(q);
        const vendorMatch = activeVendors.has('all') || activeVendors.has(row.dataset.vendor);
        row.classList.toggle('hidden-search', !nameMatch || !vendorMatch);
      });
    }

    /* ── INIT ── */
    function init() {
      const meta = DATA.metadata || {};
      const d = meta.last_updated ? new Date(meta.last_updated + 'T12:00:00') : new Date();
      document.getElementById('appDate').textContent = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

      const prev = MONTH_NAMES[prevMonth], curr = MONTH_NAMES[currentMonth], next = MONTH_NAMES[nextMonth];
      document.getElementById('mhPrev').textContent = prev;
      document.getElementById('mhCurr').textContent = curr;
      document.getElementById('mhNext').textContent = next;

      renderPriceMoves();
      renderVendorPills();
      renderSignals();
    }

    try { init(); } catch(e) {
      document.getElementById('mainContent').innerHTML =
        `<div style="padding:24px;color:#e05;font-size:0.85rem">Error: ${e.message}</div>`;
    }
  </script>
