<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Remy &middot; San Fermo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{
  /* Moonstruck — deep night sky (v5: deeper) with Cosmo's moon */
  --bg:#050918;--bg-deep:#02040d;--bg-card:#0d1535;--bg-card-h:#131c45;
  --ink:#f5e8c8;--ink-60:rgba(245,232,200,0.62);--ink-30:rgba(245,232,200,0.32);
  --ink-12:rgba(245,232,200,0.13);--ink-6:rgba(245,232,200,0.06);
  --moon:#f5e8c8;--moon-glow:rgba(245,232,200,0.45);
  --terra:#e08763;--terra-bg:rgba(224,135,99,0.14);
  --olive:#a8b97e;--olive-bg:rgba(168,185,126,0.14);
  --gold:#e2b95e;--gold-bg:rgba(226,185,94,0.14);
  --navy:#7b9bd1;--navy-bg:rgba(123,155,209,0.14);
  --fd:'Cormorant Garamond',Georgia,serif;
  --fb:'DM Sans',system-ui,sans-serif;
  --r:4px;--ease:cubic-bezier(0.4,0,0.2,1);--d:0.26s;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;color:var(--ink);
  font-family:var(--fb);-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;
  background:radial-gradient(ellipse at 50% 28%, #0c1535 0%, #050918 55%, #02040d 100%)}
/* starfield sits behind everything — subtle, almost ambient */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;width:100%;height:100%;
  opacity:0.5}

/* ── INTRO ── moonlit big REMY morphs into header position */
#intro{position:fixed;inset:0;display:flex;align-items:center;
  justify-content:center;z-index:800;transition:opacity 0.4s var(--ease);
  pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%, #0c1535 0%, #050918 60%, #02040d 100%)}
#intro.gone{opacity:0}
.intro-word{font-family:var(--fd);font-size:72px;font-weight:500;letter-spacing:0.22em;
  text-transform:uppercase;color:var(--moon);opacity:0;transform-origin:center center;
  text-shadow:0 0 36px rgba(245,232,200,0.55),
              0 0 72px rgba(245,232,200,0.32),
              0 0 12px rgba(245,232,200,0.7);
  animation:introFadeIn 0.55s var(--ease) 0.1s forwards;
  will-change:transform,opacity}
.intro-word.morph{
  transition:transform 0.95s cubic-bezier(0.55,0,0.2,1),
             text-shadow 0.95s var(--ease)}
.intro-word.morph.landed{
  text-shadow:0 0 6px rgba(245,232,200,0.4),
              0 0 14px rgba(245,232,200,0.2)}
@keyframes introFadeIn{
  from{opacity:0}
  to  {opacity:1}
}

/* ── APP SHELL ── */
#app{height:100%;position:relative;overflow:hidden;z-index:1}

/* ── PORTAL ── transparent so the starfield shines through */
#portal{position:absolute;inset:0;display:flex;flex-direction:column;
  overflow:hidden;background:transparent}
.ph{display:flex;align-items:center;padding:52px 20px 0;flex-shrink:0;gap:10px}
.ph-wordmark{display:flex;align-items:baseline;gap:7px;flex:1}
.ph-remy{font-family:var(--fd);font-size:16px;font-weight:500;letter-spacing:0.22em;
  text-transform:uppercase;color:var(--moon);
  text-shadow:0 0 8px rgba(245,232,200,0.42),0 0 16px rgba(245,232,200,0.22);
  opacity:0;transition:opacity 0.3s var(--ease)}
.ph-remy.in{opacity:1}
.ph-brand{font-family:var(--fd);font-size:13px;font-style:italic;color:var(--ink-60);
  opacity:0;transition:opacity 0.45s var(--ease)}
.ph-brand.in{opacity:1}
.ph-actions{display:flex;align-items:center;gap:4px}
.ph-icon-btn{background:none;border:none;cursor:pointer;padding:8px;
  -webkit-tap-highlight-color:transparent;position:relative;touch-action:manipulation}
.ph-icon{width:22px;height:22px;stroke:var(--ink-60);stroke-width:1.5;fill:none}
.cart-badge{position:absolute;top:4px;right:4px;min-width:16px;height:16px;border-radius:8px;
  background:var(--terra);color:#fff;font-size:9px;font-weight:500;display:none;
  align-items:center;justify-content:center;padding:0 4px}
.cart-badge.show{display:flex}

.portal-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:22px 20px 0}
.portal-prompt{font-family:var(--fd);font-size:28px;font-weight:400;color:var(--ink);
  margin-bottom:20px;line-height:1.15;
  opacity:0;animation:fadeUp 0.4s var(--ease) 2.35s forwards}
.mode-cards{display:flex;flex-direction:column;gap:10px}
.portal-footer{padding:16px 20px 34px;flex-shrink:0}

/* ── MODE CARD ── v6: moon-cream cards floating on the night sky.
   To revert to dark cards, restore the previous .mode-card / .mc-* rules from
   git commit ede4768 (v5). Whole block is self-contained. */
.mode-card{position:relative;background:var(--moon);
  border:1px solid rgba(245,232,200,0.55);border-radius:8px;
  padding:18px 18px 16px 18px;display:flex;align-items:stretch;gap:14px;
  color:#0a1028;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;
  box-shadow:0 0 0 1px rgba(245,232,200,0.18),
             0 0 24px -2px rgba(245,232,200,0.34),
             0 0 64px -18px rgba(245,232,200,0.28);
  transition:background var(--d),box-shadow var(--d),border-color var(--d),transform var(--d);
  opacity:0;animation:cardIn 0.38s var(--ease) forwards}
.mode-card:active{background:#ecddb8;
  box-shadow:0 0 0 1px rgba(245,232,200,0.32),
             0 0 38px 0 rgba(245,232,200,0.46),
             0 0 80px -16px rgba(245,232,200,0.38);
  border-color:rgba(245,232,200,0.75);transform:translateY(1px)}
.mc-body{flex:1;min-width:0}
.mc-label{font-family:var(--fd);font-size:24px;font-weight:500;color:#0a1028;line-height:1.05}
.mc-desc{font-family:var(--fd);font-size:13px;font-style:italic;color:rgba(10,16,40,0.62);
  margin-top:4px;line-height:1.35}
.mc-arrow{font-size:18px;color:rgba(10,16,40,0.4);align-self:center;flex-shrink:0}

/* ── VENDOR ALERT ── */
.vendor-alert{margin-top:14px;background:var(--terra-bg);border:1px solid rgba(224,135,99,0.3);
  border-radius:6px;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;
  display:none}
.vendor-alert.show{display:block}
.va-label{font-family:var(--fb);font-size:10px;font-weight:500;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--terra);margin-bottom:4px}
.va-body{font-family:var(--fd);font-size:15px;color:var(--ink)}

/* ── SECTION SCREENS ── */
.ss{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;
  background:var(--bg);transform:translateX(105%);transition:transform var(--d) var(--ease);
  will-change:transform}
.ss.active{transform:translateX(0)}
.sh{display:flex;align-items:center;padding:52px 20px 14px;flex-shrink:0}
.back-btn{background:none;border:none;cursor:pointer;font-family:var(--fb);font-size:11px;
  font-weight:400;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-60);
  padding:8px 12px 8px 0;-webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;gap:5px;flex-shrink:0;touch-action:manipulation}
.sh-title{font-family:var(--fd);font-size:26px;font-weight:500;flex:1;text-align:right;
  color:var(--ink);line-height:1.1}
.sh-rule{height:1px;background:var(--ink-12);margin:0 20px;flex-shrink:0}
.sh-actions{display:flex;align-items:center;gap:6px}
.sh-icon-btn{background:none;border:none;cursor:pointer;padding:6px;
  -webkit-tap-highlight-color:transparent;position:relative;touch-action:manipulation}

/* ── PILLS / FILTERS ── */
.filter-strip{display:flex;gap:6px;padding:10px 20px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
.filter-strip::-webkit-scrollbar{display:none}
.pill{font-family:var(--fb);font-size:10px;font-weight:500;letter-spacing:0.09em;
  text-transform:uppercase;padding:6px 12px;border:1px solid var(--ink-12);border-radius:20px;
  background:transparent;color:var(--ink-60);cursor:pointer;white-space:nowrap;
  flex-shrink:0;-webkit-tap-highlight-color:transparent;
  transition:background var(--d),color var(--d),border-color var(--d);touch-action:manipulation}
.pill.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* ── BUCKET SELECTOR ── */
.flow-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px 40px}
.flow-question{font-family:var(--fd);font-size:22px;font-weight:400;color:var(--ink);
  margin-bottom:16px;line-height:1.25}
.bucket-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.bucket-btn{background:var(--bg-card);border:1px solid var(--ink-12);border-radius:var(--r);
  padding:14px 12px;font-family:var(--fd);font-size:18px;font-weight:400;color:var(--ink);
  cursor:pointer;text-align:left;-webkit-tap-highlight-color:transparent;
  transition:background var(--d),border-color var(--d);touch-action:manipulation}
.bucket-btn.wide{grid-column:span 2}
.bucket-btn:active,.bucket-btn.sel{background:var(--ink);color:var(--bg);border-color:var(--ink)}
/* Date picker overlay pattern — transparent input sits on top of the styled
   button so a tap natively opens the iOS calendar. Avoids the showPicker()
   silently-failing-on-display-none trap. */
.date-pick-wrap{position:relative;grid-column:span 2}
.date-pick-input{position:absolute;inset:0;width:100%;height:100%;opacity:0;
  cursor:pointer;-webkit-appearance:none;appearance:none;background:transparent;
  border:none;padding:0;margin:0;font-size:16px;color:transparent;z-index:2}
.date-pick-input::-webkit-date-and-time-value{text-align:left}
.flow-results{margin-top:4px}
.flow-filter-wrap{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.flow-filter-row{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;padding:2px 0}
.flow-filter-row::-webkit-scrollbar{display:none}
.flow-section-hd{font-family:var(--fb);font-size:10px;font-weight:500;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--ink-30);padding:18px 0 8px;border-bottom:1px solid var(--ink-12)}
.flow-empty{padding:40px 0;text-align:center;font-family:var(--fd);font-size:17px;
  font-style:italic;color:var(--ink-30)}

/* ── DISH LIST + DETAIL (Swap a Dish) ── */
.dish-section-hd{font-family:var(--fb);font-size:10px;font-weight:500;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--ink-30);padding:18px 0 8px;border-bottom:1px solid var(--ink-12)}
.dish-row{display:flex;flex-direction:column;align-items:flex-start;gap:3px;padding:14px 0;
  border-bottom:1px solid var(--ink-12);background:none;border-left:none;border-right:none;
  border-top:none;width:100%;text-align:left;cursor:pointer;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;color:var(--ink)}
.dish-row:active{background:var(--ink-6)}
.dish-name{font-family:var(--fd);font-size:21px;color:var(--ink);line-height:1.15}
.dish-desc{font-family:var(--fd);font-size:13px;font-style:italic;color:var(--ink-60);
  margin-top:2px;line-height:1.4}
.dish-back-btn{background:none;border:none;cursor:pointer;font-family:var(--fb);font-size:11px;
  font-weight:400;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-60);
  padding:0 0 14px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.dish-detail-name{font-family:var(--fd);font-size:32px;font-weight:500;color:var(--ink);line-height:1.1}
.dish-detail-desc{font-family:var(--fd);font-size:15px;font-style:italic;color:var(--ink-60);
  margin-top:8px;line-height:1.4}
.dish-detail-hd{font-family:var(--fb);font-size:10px;font-weight:500;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--ink-30);padding:24px 0 8px;border-bottom:1px solid var(--ink-12)}
.dish-comp-list{list-style:none;padding:8px 0 0;font-family:var(--fd);font-size:17px;color:var(--ink)}
.dish-comp-list li{padding:6px 0;border-bottom:1px solid var(--ink-6)}
.dish-comp-list li:last-child{border-bottom:none}
.dish-detail-stub{margin-top:28px;padding:16px;background:var(--bg-card);border-radius:var(--r);
  border:1px solid var(--ink-12);font-family:var(--fd);font-size:14px;font-style:italic;
  color:var(--ink-60);line-height:1.5}

/* ── CREATIVE PITCH ── */
.pitch-cta-btn{margin-top:22px;width:100%;padding:16px;background:var(--moon);
  color:#0a1028;border:none;border-radius:var(--r);font-family:var(--fb);font-size:13px;
  font-weight:500;letter-spacing:0.08em;text-align:center;cursor:pointer;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
.pitch-cta-btn:active{opacity:0.82}
.pitch-loading{margin-top:28px;font-family:var(--fd);font-size:15px;font-style:italic;
  color:var(--ink-60);text-align:center;padding:28px 0}
.pitch-result{margin-top:22px}
.pitch-text{font-family:var(--fd);font-size:19px;color:var(--ink);line-height:1.6;
  padding:18px;background:var(--bg-card);border-radius:var(--r);border:1px solid var(--ink-12)}
.pitch-ing-hd{font-family:var(--fb);font-size:10px;font-weight:500;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--ink-30);padding:20px 0 8px;border-bottom:1px solid var(--ink-12)}
.pitch-ing-list{list-style:none;padding:0;margin:0}
.pitch-ing-item{display:flex;flex-direction:column;gap:3px;padding:10px 0;
  border-bottom:1px solid var(--ink-6)}
.pitch-ing-item:last-child{border-bottom:none}
.pitch-ing-name{font-family:var(--fd);font-size:16px;color:var(--ink)}
.pitch-ing-meta{font-family:var(--fb);font-size:11px;color:var(--ink-60);letter-spacing:0.04em}
.pitch-outreach-btn{margin-top:20px;width:100%;padding:14px;background:none;
  border:1px solid rgba(245,232,200,0.3);border-radius:var(--r);font-family:var(--fb);
  font-size:11px;font-weight:400;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--ink-60);cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.pitch-outreach-btn:active{background:var(--ink-6)}

/* ── WEATHER ALERT CARD ── */
.weather-alert{margin-top:10px;background:rgba(123,155,209,0.07);border:1px solid rgba(123,155,209,0.22);
  border-radius:6px;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;
  display:none}
.weather-alert.show{display:block}
.wa-w-label{font-family:var(--fb);font-size:10px;font-weight:500;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--navy);margin-bottom:4px}
.wa-w-body{font-family:var(--fd);font-size:15px;color:var(--ink)}

/* ── INGREDIENT ROW ── */
.ing-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2px 20px 40px}
.ing-row{display:flex;align-items:flex-start;gap:12px;padding:14px 0;
  border-bottom:1px solid var(--ink-12)}
.ing-row:last-child{border-bottom:none}
.ing-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:10px}
.ing-body{flex:1;min-width:0}
.ing-name{font-family:var(--fd);font-size:21px;font-weight:400;line-height:1.1;color:var(--ink)}
.ing-sub{font-family:var(--fb);font-size:11px;font-weight:300;color:var(--ink-60);margin-top:3px}
.ing-note{font-family:var(--fd);font-size:13px;font-style:italic;color:var(--ink-60);
  margin-top:4px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden}
.ing-aside{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;padding-top:1px}
.trend-badge{font-family:var(--fb);font-size:10px;font-weight:500;letter-spacing:0.05em;
  padding:3px 7px;border-radius:3px;white-space:nowrap}
.tu{background:var(--terra-bg);color:var(--terra)}.td{background:var(--olive-bg);color:var(--olive)}
.mark-btn{background:none;border:1.5px solid var(--ink-12);border-radius:50%;width:28px;height:28px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;transition:background var(--d),border-color var(--d);
  flex-shrink:0;touch-action:manipulation}
.mark-btn.marked{background:var(--terra);border-color:var(--terra)}
.mark-icon{width:12px;height:12px;stroke:var(--ink-30);stroke-width:2;fill:none;
  transition:stroke var(--d)}
.mark-btn.marked .mark-icon{stroke:#fff}
.empty-msg{padding:52px 20px;text-align:center;font-family:var(--fd);font-size:18px;
  font-style:italic;color:var(--ink-30)}

/* ── PRICE MOVES ── */
.price-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2px 20px 40px}
.price-row{display:flex;align-items:center;gap:14px;padding:15px 0;
  border-bottom:1px solid var(--ink-12)}
.price-row:last-child{border-bottom:none}
.price-dir{font-size:16px;flex-shrink:0;width:22px;text-align:center}
.price-body{flex:1;min-width:0}
.price-name{font-family:var(--fd);font-size:21px;font-weight:400;color:var(--ink)}
.price-vnd{font-family:var(--fb);font-size:11px;font-weight:300;color:var(--ink-60);margin-top:2px}
.price-stat{text-align:right;flex-shrink:0}
.price-pct{font-family:var(--fb);font-size:17px;font-weight:500}
.price-pct.up{color:var(--terra)}.price-pct.dn{color:var(--olive)}
.price-latest{display:block;font-family:var(--fb);font-size:11px;font-weight:300;
  color:var(--ink-60);margin-top:2px}

/* ── GOT SHORTED ── */
.shorted-wrap{flex:1;display:flex;flex-direction:column;padding:0 20px;overflow:hidden}
.shorted-label{font-family:var(--fd);font-size:14px;font-style:italic;color:var(--ink-60);
  margin:10px 0 8px}
.shorted-input{width:100%;padding:12px 14px;border:1px solid var(--ink-12);border-radius:var(--r);
  background:var(--bg-card);font-family:var(--fb);font-size:15px;color:var(--ink);
  outline:none;-webkit-appearance:none;flex-shrink:0}
.shorted-input:focus{border-color:var(--ink-30)}
.shorted-input::placeholder{color:var(--ink-30)}
.shorted-results{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;margin-top:8px;padding-bottom:40px}
.sub-group-hd{font-family:var(--fb);font-size:10px;font-weight:500;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--ink-30);padding:16px 0 6px;border-bottom:1px solid var(--ink-12)}
.sub-group-hd:first-child{padding-top:8px}

/* ── MARKET TABS ── */
.tab-bar{display:flex;border-bottom:1px solid var(--ink-12);flex-shrink:0;margin:0 20px}
.tab-btn{flex:1;padding:12px 0;font-family:var(--fb);font-size:11px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-60);background:none;
  border:none;border-bottom:2px solid transparent;cursor:pointer;margin-bottom:-1px;
  -webkit-tap-highlight-color:transparent;transition:color var(--d),border-color var(--d);
  touch-action:manipulation}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--ink)}
.tab-pane{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2px 20px 40px}
.tab-pane.active{display:block}
.market-row{display:flex;align-items:center;gap:14px;padding:15px 0;
  border-bottom:1px solid var(--ink-12)}
.market-row:last-child{border-bottom:none}
.market-body{flex:1;min-width:0}
.market-name{font-family:var(--fd);font-size:21px;font-weight:400;color:var(--ink)}
.market-vnd{font-family:var(--fb);font-size:11px;font-weight:300;color:var(--ink-60);margin-top:2px}
.market-stat{text-align:right;flex-shrink:0}
.market-pct{font-family:var(--fb);font-size:17px;font-weight:500}
.market-pct.warn{color:var(--terra)}.market-pct.good{color:var(--olive)}
.market-price{display:block;font-family:var(--fb);font-size:11px;font-weight:300;color:var(--ink-60);margin-top:2px}

/* ── CART ── */
.cart-empty{padding:60px 20px;text-align:center}
.cart-empty-title{font-family:var(--fd);font-size:28px;font-weight:400;color:var(--ink);margin-bottom:8px}
.cart-empty-sub{font-family:var(--fd);font-size:15px;font-style:italic;color:var(--ink-60)}
.cart-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 40px}
.cart-vendor-group{margin-top:20px}
.cart-vendor-name{font-family:var(--fd);font-size:22px;font-weight:500;color:var(--ink);
  padding-bottom:8px;border-bottom:1px solid var(--ink-12);margin-bottom:2px}
.cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;
  border-bottom:1px solid var(--ink-6)}
.cart-item:last-child{border-bottom:none}
.cart-item-body{flex:1;min-width:0}
.cart-item-name{font-family:var(--fd);font-size:19px;color:var(--ink)}
.cart-item-meta{font-family:var(--fb);font-size:10px;font-weight:300;color:var(--ink-60);margin-top:2px}
.qty-input{width:72px;padding:6px 8px;border:1px solid var(--ink-12);border-radius:var(--r);
  background:var(--bg);font-family:var(--fb);font-size:12px;color:var(--ink);
  text-align:center;outline:none;-webkit-appearance:none;flex-shrink:0}
.qty-input:focus{border-color:var(--ink-30)}
.qty-input::placeholder{color:var(--ink-30)}
.remove-btn{background:none;border:none;cursor:pointer;padding:6px;color:var(--ink-30);
  font-size:16px;-webkit-tap-highlight-color:transparent;flex-shrink:0;
  touch-action:manipulation;transition:color var(--d)}
.remove-btn:active{color:var(--terra)}
.draft-btn{display:block;width:100%;margin-top:14px;padding:12px;background:var(--ink);
  color:var(--bg);border:none;border-radius:var(--r);cursor:pointer;font-family:var(--fd);
  font-size:18px;font-weight:400;letter-spacing:0.02em;-webkit-tap-highlight-color:transparent;
  transition:opacity var(--d);touch-action:manipulation}
.draft-btn:active{opacity:0.85}
.cart-footer-row{padding:16px 20px 34px;flex-shrink:0}
.clear-cart-btn{background:none;border:none;cursor:pointer;font-family:var(--fb);font-size:11px;
  font-weight:400;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-30);
  padding:4px 0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

/* ── OUTREACH ── */
.outreach-loading{flex:1;display:flex;align-items:center;justify-content:center}
.outreach-spinner{width:28px;height:28px;border:2px solid var(--ink-12);
  border-top-color:var(--ink-60);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.outreach-loading-text{font-family:var(--fd);font-size:16px;font-style:italic;
  color:var(--ink-60);margin-top:14px;text-align:center}
.outreach-body{flex:1;display:flex;flex-direction:column;padding:0 20px;overflow:hidden}
.outreach-contact{font-family:var(--fb);font-size:12px;color:var(--ink-60);margin-bottom:12px}
.outreach-textarea{flex:1;width:100%;padding:14px;border:1px solid var(--ink-12);
  border-radius:var(--r);background:var(--bg-card);font-family:var(--fb);font-size:13px;
  line-height:1.6;color:var(--ink);outline:none;resize:none;-webkit-appearance:none;overflow-y:auto}
.outreach-textarea:focus{border-color:var(--ink-30)}
.outreach-actions{display:flex;gap:10px;padding:14px 0 34px;flex-shrink:0}
.copy-btn{flex:1;padding:13px;background:var(--ink);color:var(--bg);border:none;
  border-radius:var(--r);cursor:pointer;font-family:var(--fd);font-size:18px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:opacity var(--d)}
.copy-btn:active{opacity:0.85}.copy-btn.copied{background:var(--olive)}
.outreach-error{flex:1;padding:40px 20px;text-align:center}
.outreach-error-text{font-family:var(--fd);font-size:16px;font-style:italic;color:var(--terra)}
.retry-btn{margin-top:16px;background:none;border:1px solid var(--ink-12);border-radius:var(--r);
  padding:10px 20px;font-family:var(--fd);font-size:16px;cursor:pointer;color:var(--ink-60);
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}

/* ── SETTINGS SHEET ── */
#settings-sheet{position:fixed;inset:0;z-index:600;pointer-events:none}
#settings-sheet.open{pointer-events:all}
.ss-backdrop{position:absolute;inset:0;background:rgba(6,10,28,0.7);opacity:0;
  transition:opacity var(--d)}
#settings-sheet.open .ss-backdrop{opacity:1}
.ss-panel{position:absolute;bottom:0;left:0;right:0;height:70%;background:var(--bg-card);
  border-radius:10px 10px 0 0;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform var(--d) var(--ease)}
#settings-sheet.open .ss-panel{transform:translateY(0)}
.ss-handle{width:36px;height:4px;background:var(--ink-12);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.ss-head{display:flex;align-items:center;padding:14px 20px;flex-shrink:0;border-bottom:1px solid var(--ink-12)}
.ss-head-title{font-family:var(--fd);font-size:22px;font-weight:500;flex:1}
.ss-close{background:none;border:none;cursor:pointer;font-family:var(--fb);font-size:11px;
  letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-60);padding:6px 0;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
.ss-body{flex:1;padding:14px 20px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.ss-label{font-family:var(--fb);font-size:10px;font-weight:500;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--ink-30)}
.ss-textarea{flex:1;min-height:120px;width:100%;padding:12px;border:1px solid var(--ink-12);
  border-radius:var(--r);background:var(--bg);font-family:var(--fb);font-size:12px;
  line-height:1.6;color:var(--ink);outline:none;resize:none;-webkit-appearance:none}
.ss-input{width:100%;padding:10px 12px;border:1px solid var(--ink-12);border-radius:var(--r);
  background:var(--bg);font-family:var(--fb);font-size:12px;color:var(--ink);
  outline:none;-webkit-appearance:none}
.ss-input:focus,.ss-textarea:focus{border-color:var(--ink-30)}
.ss-save{padding:11px;background:var(--ink);color:var(--bg);border:none;border-radius:var(--r);
  cursor:pointer;font-family:var(--fd);font-size:17px;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;flex-shrink:0}

/* ── FULL VIEW ── */
#full-view{position:fixed;inset:0;z-index:500;pointer-events:none}
#full-view.open{pointer-events:all}
.fv-bd{position:absolute;inset:0;background:rgba(6,10,28,0.7);opacity:0;transition:opacity var(--d)}
#full-view.open .fv-bd{opacity:1}
.fv-sheet{position:absolute;bottom:0;left:0;right:0;height:92%;background:var(--bg-card);
  border-radius:10px 10px 0 0;display:flex;flex-direction:column;overflow:hidden;
  transform:translateY(100%);transition:transform var(--d) var(--ease)}
#full-view.open .fv-sheet{transform:translateY(0)}
.fv-handle{width:36px;height:4px;background:var(--ink-12);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.fv-head{padding:10px 20px 14px;flex-shrink:0}
.fv-head-title{font-family:var(--fd);font-size:22px;font-weight:500;margin-bottom:10px}
.fv-search{width:100%;padding:10px 14px;border:1px solid var(--ink-12);border-radius:var(--r);
  background:var(--bg);font-family:var(--fb);font-size:14px;color:var(--ink);
  outline:none;-webkit-appearance:none}
.fv-search::placeholder{color:var(--ink-30)}.fv-search:focus{border-color:var(--ink-30)}
.fv-months{display:grid;grid-template-columns:1fr 56px 56px 56px;gap:3px;
  padding:8px 20px;border-top:1px solid var(--ink-12);border-bottom:1px solid var(--ink-12);
  background:var(--bg);flex-shrink:0}
.fv-ml{font-family:var(--fb);font-size:10px;font-weight:500;letter-spacing:0.1em;
  text-transform:uppercase;text-align:center;color:var(--ink-30);padding:2px 0}
.fv-ml.now{color:var(--olive)}
.fv-rows{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.fv-row{display:grid;grid-template-columns:1fr 56px 56px 56px;gap:3px;
  padding:0 20px;border-bottom:1px solid var(--ink-6);align-items:center;min-height:42px}
.fv-row:last-child{border-bottom:none}
.fv-rn{font-family:var(--fd);font-size:16px;color:var(--ink);padding:8px 0}
.fv-cell{height:26px;border-radius:3px;display:flex;align-items:center;justify-content:center}
.fv-c0{background:transparent}.fv-c1{background:rgba(168,185,126,0.20)}
.fv-c2{background:rgba(168,185,126,0.42)}.fv-c3{background:rgba(226,185,94,0.30)}
.fv-c4{background:transparent;border:1px dashed rgba(168,185,126,0.32)}
.fv-dot{width:5px;height:5px;border-radius:50%}
.fv-c0 .fv-dot{display:none}.fv-c1 .fv-dot{background:var(--olive);opacity:0.6}
.fv-c2 .fv-dot{background:var(--olive);width:7px;height:7px}
.fv-c3 .fv-dot{background:var(--gold);opacity:0.8}.fv-c4 .fv-dot{background:var(--olive);opacity:0.3}

/* ── SHARED ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}
.mode-card{transform:translateY(8px)}
</style>
</head>
<body>

city="0.29"/><circle cx="224" cy="1555" r="0.59" fill="#f5e8c8" opacity="0.27"/><circle cx="670" cy="797" r="1.09" fill="#f5e8c8" opacity="0.45"/><circle cx="937" cy="1026" r="0.49" fill="#f5e8c8" opacity="0.46"/><circle cx="616" cy="1275" r="0.72" fill="#f5e8c8" opacity="0.48"/><circle cx="885" cy="1035" r="0.45" fill="#f5e8c8" opacity="0.37"/><circle cx="142" cy="580" r="0.66" fill="#f5e8c8" opacity="0.27"/><circle cx="33" cy="298" r="0.86" fill="#f5e8c8" opacity="0.25"/><circle cx="372" cy="1046" r="1.35" fill="#f5e8c8" opacity="0.58"/><circle cx="278" cy="1409" r="1.81" fill="#f5e8c8" opacity="0.71"/><circle cx="81" cy="915" r="0.51" fill="#f5e8c8" opacity="0.37"/><circle cx="15" cy="67" r="0.45" fill="#f5e8c8" opacity="0.26"/></svg>

<!-- INTRO -->
<div id="intro"><div class="intro-word">Remy</div></div>

<!-- APP -->
<div id="app">

<!-- PORTAL -->
<div id="portal">
  <div class="ph">
    <div class="ph-wordmark">
      <span class="ph-remy">Remy</span>
      <span class="ph-brand">&middot; San Fermo</span>
    </div>
    <div class="ph-actions">
      <button class="ph-icon-btn" onclick="goTo('cart')" aria-label="Cart">
        <svg class="ph-icon" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-badge" id="portal-badge"></span>
      </button>
      <button class="ph-icon-btn" onclick="openSettings()" aria-label="Settings">
        <svg class="ph-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
    </div>
  </div>
  <div class="portal-scroll">
    <div class="portal-prompt">How can Remy help today?</div>
    <div class="mode-cards" id="mode-cards"></div>
    <div class="vendor-alert" id="vendor-alert" onclick="showVendorAlert()"></div>
    <div class="weather-alert" id="weather-alert" onclick="showWeatherAlert()"></div>
  </div>
</div>

<!-- SCREEN: BROWSE -->
<div class="ss" id="screen-browse">
  <div class="sh">
    <button class="back-btn" onclick="goBack()">&#8592; Back</button>
    <div class="sh-actions">
      <button class="sh-icon-btn" onclick="goTo('cart')" aria-label="Cart">
        <svg style="width:22px;height:22px;stroke:var(--ink-60);stroke-width:1.5;fill:none" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-badge" id="browse-badge"></span>
      </button>
    </div>
  </div>
  <div class="sh-rule"></div>
  <!-- arriving -->
  <div id="browse-section" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
    <div class="filter-strip" id="browse-tabs">
      <button class="pill active" onclick="setBrowseTab('arriving')">Arriving</button>
      <button class="pill" onclick="setBrowseTab('peak')">At Peak</button>
      <button class="pill" onclick="setBrowseTab('ending')">Ending Soon</button>
      <button class="pill" onclick="setBrowseTab('prices')">Price Moves</button>
    </div>
    <div id="browse-arriving" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <div class="filter-strip" id="arriving-pills"></div>
      <div class="ing-scroll" id="arriving-list"></div>
    </div>
    <div id="browse-peak" style="flex:1;overflow:hidden;display:none;flex-direction:column">
      <div class="filter-strip" id="peak-pills"></div>
      <div class="ing-scroll" id="peak-list"></div>
    </div>
    <div id="browse-ending" style="flex:1;overflow:hidden;display:none;flex-direction:column">
      <div class="filter-strip" id="ending-pills"></div>
      <div class="ing-scroll" id="ending-list"></div>
    </div>
    <div id="browse-prices" style="flex:1;overflow:hidden;display:none;flex-direction:column">
      <div class="price-scroll" id="price-list"></div>
    </div>
  </div>
  <div class="portal-footer">
    <button class="see-all" onclick="openFullView()" style="font-family:var(--fd);font-size:15px;font-style:italic;color:var(--ink-60);background:none;border:none;cursor:pointer;padding:8px 20px;letter-spacing:0.02em">See everything &rarr;</button>
  </div>
</div>

<!-- SCREEN: GOT SHORTED -->
<div class="ss" id="screen-shorted">
  <div class="sh">
    <button class="back-btn" onclick="goBack()">&#8592; Back</button>
    <span class="sh-title">Got Shorted</span>
  </div>
  <div class="sh-rule"></div>
  <div class="shorted-wrap">
    <div class="shorted-label">What ingredient do you need to replace?</div>
    <input class="shorted-input" id="shorted-input" type="text" placeholder="e.g. dungeness crab, morel, ramp&hellip;" oninput="runShorted(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="shorted-results" id="shorted-results">
      <div class="empty-msg" style="padding-top:32px">Start typing to find alternatives.</div>
    </div>
  </div>
</div>

<!-- SCREEN: EVENT -->
<div class="ss" id="screen-event">
  <div class="sh">
    <button class="back-btn" onclick="goBack()">&#8592; Back</button>
    <span class="sh-title">Event Coming Up</span>
  </div>
  <div class="sh-rule"></div>
  <div class="flow-wrap" id="event-flow"></div>
</div>

<!-- SCREEN: PLANNING (seasonal menu change) -->
<div class="ss" id="screen-planning">
  <div class="sh">
    <button class="back-btn" onclick="goBack()">&#8592; Back</button>
    <span class="sh-title">Menu Change</span>
  </div>
  <div class="sh-rule"></div>
  <div class="flow-wrap" id="planning-flow"></div>
</div>

<!-- SCREEN: SWAP A DISH (current menu) -->
<div class="ss" id="screen-menuitem">
  <div class="sh">
    <button class="back-btn" onclick="goBack()">&#8592; Back</button>
    <span class="sh-title">How's the Menu?</span>

// ── DATE ───────────────────────────────────────────────────────────
var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var now=new Date();
var curM=now.getMonth(); // 0-indexed
var prevM=(curM+11)%12;
var nextM=(curM+1)%12;
var MONTH_NAMES=MONTHS;

function monthsAhead(n){ return (curM+n)%12; }

function sc(ing,mi){
  var ms=ing.months||[];
  if(mi<0||mi>=ms.length) return 0;
  return ms[mi]||0;
}

function isArriving(ing){
  var c=sc(ing,curM);
  if(c===0||c===4) return false;
  var p=sc(ing,prevM);
  return p===0||p===4;
}
function isPeak(ing){ return sc(ing,curM)===2; }
function isEnding(ing){
  var c=sc(ing,curM); if(c===0||c===4) return false;
  var n=sc(ing,nextM); return n===0||n===4;
}

function catIdx(ing){
  var i=CAT_ORDER.indexOf((ing.category||'').toLowerCase());
  return i<0?99:i;
}

// ── TRENDS ─────────────────────────────────────────────────────────
var TREND_MAP={};
function buildTrendMap(){
  (DATA.price_trends||[]).forEach(function(t){ TREND_MAP[t.ingredient]=t; });
}
function trendFor(name){ return TREND_MAP[name]||null; }

// ── SORTING ─────────────────────────────────────────────────────────
function sortArriving(ings){
  return ings.slice().sort(function(a,b){
    var pa=sc(a,prevM)===0?0:1,pb=sc(b,prevM)===0?0:1;
    if(pa!==pb) return pa-pb;
    var ca=catIdx(a),cb=catIdx(b);
    if(ca!==cb) return ca-cb;
    return a.name.localeCompare(b.name);
  });
}
function sortPeak(ings){
  return ings.slice().sort(function(a,b){
    var ta=trendFor(a.name),tb=trendFor(b.name);
    var pa=(ta&&ta.trend_30d_pct>5)?1:0,pb=(tb&&tb.trend_30d_pct>5)?1:0;
    if(pa!==pb) return pb-pa;
    return catIdx(a)-catIdx(b)||a.name.localeCompare(b.name);
  });
}
function sortEnding(ings){
  return ings.slice().sort(function(a,b){
    var ga=sc(a,nextM)===0?0:1,gb=sc(b,nextM)===0?0:1;
    if(ga!==gb) return ga-gb;
    return catIdx(a)-catIdx(b)||a.name.localeCompare(b.name);
  });
}

function buildPills(pillsId, listId, ings, dotColor){
  var vendors=['All'].concat(
    ings.map(function(i){ return i.vendor||''; })
      .filter(function(v,i,a){ return v&&a.indexOf(v)===i; }).sort()
  );
  var pEl=document.getElementById(pillsId);
  var lEl=document.getElementById(listId);
  if(!pEl||!lEl) return;
  if(vendors.length<=2){
    pEl.style.display='none';
    lEl.innerHTML=ings.map(function(i){ return ingRow(i,dotColor); }).join('')||'<div class="empty-msg">Nothing here right now.</div>';
    return;
  }
  var active='All';
  function render(){
    var filtered=active==='All'?ings:ings.filter(function(i){ return (i.vendor||'')===(active); });
    lEl.innerHTML=filtered.map(function(i){ return ingRow(i,dotColor); }).join('')||'<div class="empty-msg">Nothing from this vendor right now.</div>';
  }
  pEl.innerHTML=vendors.map(function(v){
    return '<button class="pill'+(v==='All'?' active':'')+'" onclick="setPill(\''+pillsId+'\',\''+v+'\',this,\''+listId+'\',\''+dotColor+'\')">'+v+'</button>';
  }).join('');
  render();
}

function setPill(pillsId,vendor,btn,listId,dotColor){
  document.querySelectorAll('#'+pillsId+' .pill').forEach(function(b){ b.classList.remove('active'); });

  // re-render list for this vendor
  var listEl=document.getElementById(listId);
  var tabIng=[];
  if(pillsId==='arriving-pills') tabIng=_browse.arriving;
  else if(pillsId==='peak-pills') tabIng=_browse.peak;
  else if(pillsId==='ending-pills') tabIng=_browse.ending;
  var filtered=vendor==='All'?tabIng:tabIng.filter(function(i){ return (i.vendor||'')===vendor; });
  listEl.innerHTML=filtered.map(function(i){ return ingRow(i,dotColor); }).join('')||'<div class="empty-msg">Nothing from this vendor.</div>';
}

  var inSeasonNames={};
  ings.forEach(function(i){ if(sc(i,curM)>0) inSeasonNames[i.name]=i; });

  // Watch out: price up >= 5% (loosened 2026-05-06, was >8)
  var watchout=trends.filter(function(t){ return (t.trend_30d_pct||0)>=5 && t.latest_price; })
    .sort(function(a,b){ return (b.trend_30d_pct||0)-(a.trend_30d_pct||0); });
  var woEl=document.getElementById('watchout-list');
  if(woEl){
    woEl.innerHTML=watchout.length?watchout.map(function(t){
      return '<div class="market-row">'+
        '<div class="market-body">'+
          '<div class="market-name">'+t.ingredient+'</div>'+
          '<div class="market-vnd">'+(t.vendor||'')+'</div>'+
        '</div>'+
        '<div class="market-stat">'+
          '<div class="market-pct warn">+'+((t.trend_30d_pct||0).toFixed(1))+'%</div>'+
          '<span class="market-price">$'+t.latest_price+'/'+(t.unit||'lb')+'</span>'+
        '</div>'+
      '</div>';
    }).join(''):'<div class="empty-msg">No significant cost increases right now.</div>';
  }

  // Opportunity: in season + price stable/falling or no trend data
  var opps=ings.filter(function(i){
    if(sc(i,curM)!==2) return false; // only peak
    var t=trendFor(i.name);
    return !t||(t.trend_30d_pct||0)<=3;
  }).sort(function(a,b){ return catIdx(a)-catIdx(b)||a.name.localeCompare(b.name); });
  var opEl=document.getElementById('opportunity-list');
  if(opEl){
    opEl.innerHTML=opps.length?opps.map(function(i){
      var t=trendFor(i.name);
      return ingRow(i,'var(--olive)');
    }).join(''):'<div class="empty-msg">No standout value plays right now.</div>';
  }
}

// ── GOT SHORTED ─────────────────────────────────────────────────────
function matchKeyword(term){
  var t=term.toLowerCase().trim();
  var best=null;
  var keys=Object.keys(KEYWORD_MAP);
  for(var i=0;i<keys.length;i++){
    if(t.indexOf(keys[i])>=0||keys[i].indexOf(t)>=0){
      best=KEYWORD_MAP[keys[i]];
      break;
    }
  }
  return best;
}

function resetShorted(){
  var inp=document.getElementById('shorted-input');
  if(inp) inp.value='';
  var el=document.getElementById('shorted-results');
  if(el) el.innerHTML='<div class="empty-msg" style="padding-top:32px">Start typing to find alternatives.</div>';
}

function runShorted(val){
  var el=document.getElementById('shorted-results');
  if(!el) return;
  var term=(val||'').trim();
  if(term.length<2){
    el.innerHTML='<div class="empty-msg" style="padding-top:32px">Start typing to find alternatives.</div>';
    return;
  }
  var ings=DATA.ingredients||[];
  var inSeason=ings.filter(function(i){ return sc(i,curM)>0; });

  // Direct name matches
  var direct=inSeason.filter(function(i){
    return i.name.toLowerCase().indexOf(term.toLowerCase())>=0;
  });

  // Keyword category match
  var kw=matchKeyword(term);
  var sameSub=[], sameCat=[];
  if(kw){
    sameSub=inSeason.filter(function(i){
      if(direct.indexOf(i)>=0) return false;
      var ik=matchKeyword(i.name);
      return ik&&ik.sub===kw.sub;
    });
    sameCat=inSeason.filter(function(i){
      if(direct.indexOf(i)>=0||sameSub.indexOf(i)>=0) return false;
      return (i.category||'').toLowerCase()===kw.cat;
    });
  } else {
    // Fallback: same category as any direct match
    if(direct.length){
      var dc=(direct[0].category||'').toLowerCase();
      sameCat=inSeason.filter(function(i){
        return (i.category||'').toLowerCase()===dc && direct.indexOf(i)<0;
      });
    }
  }

  var html='';
  if(direct.length){
    html+='<div class="sub-group-hd">In season now</div>';
    html+=direct.map(function(i){ return ingRow(i,'var(--olive)'); }).join('');
  }
  if(sameSub.length){
    html+='<div class="sub-group-hd">Similar — '+(kw?kw.sub:'same type')+'</div>';
    html+=sameSub.map(function(i){ return ingRow(i,'var(--gold)'); }).join('');
  }
  if(sameCat.length){
    var catLabel=kw?kw.cat:(direct[0]?direct[0].category:'same category');
    html+='<div class="sub-group-hd">Broader — '+(catLabel||'alternatives')+'</div>';
    html+=sameCat.slice(0,8).map(function(i){ return ingRow(i,'var(--ink-30)'); }).join('');
  }
  if(!direct.length&&!sameSub.length&&!sameCat.length){
    html='<div class="empty-msg">Nothing in season matches. Try a broader term.</div>';
  }
  el.innerHTML=html;
}

// ── DISH AFFINITIES ──────────────────────────────────────────────────────────
// Maps lowercase dish names to ingredient keywords that boost signal relevance.
// Keywords match case-insensitively against ingredient.name (substring).
// Add/extend as the menu evolves — keys = dish name.toLowerCase().
var DISH_AFFINITIES = {
  'agnolotti del plin':           ['nettle','pea','fava','herb','sorrel','spinach','fiddlehead','fern','lemon','greens','shoots'],
  'mafaldine aglio e olio':       [],  // extruded pasta anchor only — anything goes, pass all signals
  "paccheri all'amatriciana":    ['tomato','pepper','fennel','guanciale','pork','chili'],
  'saffron spaghetti bolognese':  ['tomato','fennel','pork','veal','mushroom','herb','rosemary','morel','wine cap'],
  'risotto funghi':               [],  // GF is the only anchor — everything else can swing, pass all signals
  'sea scallops':                 ['scallop','crab','shrimp','prawn','salmon','halibut','cod','rockfish','lingcod','oyster','clam','dungeness','lobster','tomato','corn','basil','pea','herb'],
  // Fully flexible — no affinity filter, pass all signals through so the Worker
  // can use the brief to decide what's interesting (protein can rotate, dish can
  // become something else, etc.)
  'filet mignon':                 [],
  'grilled bavette':              [],
  'farinata':                     ['herb','nettle','pea','sorrel','greens','mushroom','squash','flower','ramp'],
  'house caesar':                 ['anchovy','fish','salmon','herb','greens','lettuce','ramp','allium'],
  'endive salad':                 [],
  'burrata':                      [],
  'bruschetta':                   [],
  'castelvetrano olives':         [],
  'marcona almonds':              [],
  'sea wolf bakery baguette':     [],
};

function _affinityScore(ingredientName, keys){
  if(!keys || !keys.length) return 0;
  var n = (ingredientName||'').toLowerCase();
  var s = 0;
  for(var i=0;i<keys.length;i++){ if(n.indexOf(keys[i])>=0) s++; }
  return s;
}

function _sortByAffinity(signals, keys){
  if(!keys || !keys.length) return signals;
  return signals.slice().sort(function(a,b){
    return _affinityScore(b.ingredient,keys) - _affinityScore(a.ingredient,keys);
  });
}

// Filter a signal list to only items with affinity > 0 for this dish.
// When keys are defined but nothing matches, returns empty array (honest "(none)")
// rather than passing irrelevant signals that confuse the pitch.
// When no keys are defined (garnish dishes), passes everything through.
function _filterByAffinity(signals, keys){
  if(!keys || !keys.length) return signals;
  return signals.filter(function(s){ return _affinityScore(s.ingredient, keys) > 0; });
}


var _pitchDish = null;

function _escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fetchPitch(){
  var dish = _pitchDish;
  if(!dish) return;
  var zone = document.getElementById('pitch-zone');
  if(!zone) return;
  zone.innerHTML = '<div class="pitch-loading">Remy is reading the signals…</div>';

  var peaking=[], arriving=[], fading=[], price_moves=[];
  var _inSeasonNames = {};
  (DATA.ingredients||[]).forEach(function(i){
    var inSeason = sc(i,curM)>0 && sc(i,curM)!==4;
    if(!inSeason) return;
    _inSeasonNames[i.name] = true;
    var sig = {ingredient:i.name, vendor:i.vendor||'', notes:(i.notes||'').slice(0,100)};
    if(isPeak(i) && isEnding(i)){
      peaking.push(Object.assign({},sig,{action_hint:'peak ending soon'}));
    } else if(isArriving(i)){
      arriving.push(Object.assign({},sig,{score_label:isPeak(i)?'peak':'available'}));
    } else if(isEnding(i)){
      fading.push(Object.assign({},sig,{action_hint:'window closing'}));
    }
  });
  (DATA.price_trends||[]).forEach(function(t){
    if(Math.abs(t.trend_30d_pct||0)>=5){
      price_moves.push({ingredient:t.ingredient, vendor:t.vendor||'',
        notes:'$'+t.latest_price+'/'+(t.unit||'lb')+' ('+(t.trend_30d_pct>0?'+':'')+parseFloat(t.trend_30d_pct).toFixed(1)+'%)'});
    }
  });

  // Affinity filter: sort by dish relevance then drop items with score 0.
  // Irrelevant items in peaking/arriving/fading were confusing the Worker —
  // even after sorting, score-0 items (Fiddleheads, Braising Mix, etc.) were
  // sent as the first items when no dish-relevant ingredient ranked higher.
  // Now each bucket only contains ingredients that actually match this dish.
  // Empty bucket → honest "(none)" signal. Available pool covers the rest.
  var _afKeys = DISH_AFFINITIES[(dish.name||'').toLowerCase()] || [];
  peaking  = _filterByAffinity(_sortByAffinity(peaking,  _afKeys), _afKeys);
  arriving = _filterByAffinity(_sortByAffinity(arriving, _afKeys), _afKeys);
  fading   = _filterByAffinity(_sortByAffinity(fading,   _afKeys), _afKeys);

  // Available pool: in-season items not captured by peaking/arriving/fading.
  // Mid-season plateau items (available last month, this month, next month) fall
  // through the strict gates above — this catches them and surfaces the ones most
  // relevant to the selected dish via affinity sort.
  var _bucketed = {};
  peaking.forEach(function(s){_bucketed[s.ingredient]=true;});
  arriving.forEach(function(s){_bucketed[s.ingredient]=true;});
  fading.forEach(function(s){_bucketed[s.ingredient]=true;});
  var available = [];
  (DATA.ingredients||[]).forEach(function(i){
    if(_bucketed[i.name]) return;
    if(!_inSeasonNames[i.name]) return;
    available.push({ingredient:i.name, vendor:i.vendor||'', notes:(i.notes||'').slice(0,100)});
  });
  available = _sortByAffinity(available, _afKeys);

  // Debug log — remove after confirming pools look right in the console.
  // All four arrays shown are POST-filter (affinity>0 only for bucketed pools).
  console.log('[Remy pitch debug]', {
    dish: (dish.name||'').toLowerCase(),
    affinityKeys: _afKeys,
    pools: { peaking: peaking.length, arriving: arriving.length, fading: fading.length, available: available.length },
    peaking: peaking.map(function(s){return s.ingredient;}),
    arriving: arriving.map(function(s){return s.ingredient;}),
    fading: fading.map(function(s){return s.ingredient;}),
    availableTop8: available.slice(0,8).map(function(s){return s.ingredient;})
  });
  // Expected for Risotto Funghi: peaking=[], arriving=[Porcini], fading=[Wine Cap],
  //   available top = [Maitake, Morels, ...]
  // Expected for Sea Scallops: peaking=[], arriving=[Snap/Snow Peas], fading=[English Peas, Blackmouth Salmon],
  //   available top = [Oysters, Dungeness Crab, Halibut, ...]

  var components = (dish.components||[]).map(function(c){ return typeof c==='string'?{name:c}:c; });
  fetch(getWorkerUrl()+'/pitch', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      dishName: dish.name,
      description: dish.description||'',
      brief: dish.brief||'',
      components: components,
      signals: {
        peaking: peaking.slice(0,8),
        arriving: arriving.slice(0,8),
        fading: fading.slice(0,6),
        available: available.slice(0,8),
        price_moves: price_moves.slice(0,4)
      }
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if(!data || data.error){
      zone.innerHTML='<div class="pitch-loading">Remy hit a snag. Try again.</div>';
      return;
    }
    var html='<div class="pitch-result">';
    html+='<div class="pitch-text">'+_escHtml(data.pitch)+'</div>';
    var ings = Array.isArray(data.ingredients)?data.ingredients:[];
    if(ings.length){
      html+='<div class="pitch-ing-hd">In the pitch</div>';
      html+='<ul class="pitch-ing-list">';
      var BADGE={peaking:'Peak now',arriving:'Arriving',fading:'Fading',price_move:'Price move'};
      ings.forEach(function(ing){
        var badge=BADGE[ing.status]||(ing.status||'');
        var meta=[badge,_escHtml(ing.vendor||''),_escHtml(ing.note||'')].filter(Boolean).join(' · ');
        html+='<li class="pitch-ing-item">'+
          '<span class="pitch-ing-name">'+_escHtml(ing.name)+'</span>'+
          '<span class="pitch-ing-meta">'+meta+'</span>'+
        '</li>';
      });
      html+='</ul>';
    }
    var vendors=[];
    ings.forEach(function(i){ if(i.vendor&&vendors.indexOf(i.vendor)<0) vendors.push(i.vendor); });
    if(vendors.length){
      html+='<button class="pitch-outreach-btn" onclick="_pitchOutreach('+
        JSON.stringify(JSON.stringify(vendors))+')">Draft outreach for this dish →</button>';
    }
    html+='</div>';
    zone.innerHTML=html;
  })
  .catch(function(){
    zone.innerHTML='<div class="pitch-loading">Couldn\'t reach Remy. Check your connection.</div>';
  });
}

function selectDate(containerId, mode, val){
  if(!val) return;
  var d=new Date(val);
  var m=d.getMonth();
  // Event + menuitem: single-month focus on the picked date's month.
  // Planning: show the 3-month span starting at the picked date's month.
  if(mode==='planning'){
    var months=[m, (m+1)%12, (m+2)%12];
    renderFlowResults(containerId, mode, months, MONTHS[m]+'–'+MONTHS[(m+2)%12]);
  } else {
    renderFlowResults(containerId, mode, [m]);
  }
}

// Filter state per flow container — persists during session, resets when bucket/season/date changes.
var _flowFilters={};

function _uniq(arr){
  var seen={}, out=[];
  arr.forEach(function(v){ if(v && !seen[v]){ seen[v]=1; out.push(v); }});
  return out.sort();
}

function setFlowFilter(containerId, kind, value){
  var f=_flowFilters[containerId]; if(!f) return;
  f[kind]=value;
  if(f._lastCall) renderFlowResults(containerId, f._lastCall.mode, f._lastCall.monthIndices, f._lastCall.label);
}

function _flowFilterStrip(containerId, vendors, categories, f){
  var html='<div class="flow-filter-wrap">';
  if(vendors.length>2){
    html+='<div class="flow-filter-row">'+
      vendors.map(function(v){
        var safe=v.replace(/'/g,"\\'");
        return '<button class="pill'+(v===f.vendor?' active':'')+'" onclick="setFlowFilter(\''+containerId+'\',\'vendor\',\''+safe+'\')">'+v+'</button>';
      }).join('')+
    '</div>';
  }
  if(categories.length>2){
    html+='<div class="flow-filter-row">'+
      categories.map(function(c){
        var safe=c.replace(/'/g,"\\'");
        return '<button class="pill'+(c===f.category?' active':'')+'" onclick="setFlowFilter(\''+containerId+'\',\'category\',\''+safe+'\')">'+c+'</button>';
      }).join('')+
    '</div>';
  }
  html+='</div>';
  return html;
}

// monthIndices: array of 0-11 month indices (target window)
// label: optional human-readable label for the window (used in section heads)
function renderFlowResults(containerId, mode, monthIndices, label){
  var resEl=document.getElementById(containerId+'-results');
  if(!resEl) return;
  var ings=DATA.ingredients||[];
  var winLabel = label || (monthIndices.length===1 ? MONTHS[monthIndices[0]] : MONTHS[monthIndices[0]]+'–'+MONTHS[monthIndices[monthIndices.length-1]]);

  // Filter state setup. Reset filters when the bucket/season/date changes.
  var f = _flowFilters[containerId] = _flowFilters[containerId] || {vendor:'All', category:'All'};
  var callKey = mode+'|'+monthIndices.join(',')+'|'+(label||'');
  if(f._callKey !== callKey){
    f.vendor='All'; f.category='All'; f._callKey=callKey;
  }
  f._lastCall = {mode:mode, monthIndices:monthIndices, label:label};

  // Compute base sections (unfiltered)
  var sections = []; // [{label, ings, dotColor}]
  if(mode==='event'){
    var target=monthIndices[0];
    var atPeak=ings.filter(function(i){ return sc(i,target)>=2; })
      .sort(function(a,b){ return catIdx(a)-catIdx(b)||a.name.localeCompare(b.name); });
    var arriving=ings.filter(function(i){
      var p=sc(i,(target+11)%12); var c=sc(i,target);
      return c>0&&(p===0||p===4);
    }).sort(function(a,b){ return catIdx(a)-catIdx(b)||a.name.localeCompare(b.name); });
    if(atPeak.length)   sections.push({label:'At peak '+winLabel, ings:atPeak, dotColor:'var(--terra)'});
    if(arriving.length) sections.push({label:'Arriving '+winLabel, ings:arriving, dotColor:'var(--olive)'});
  } else {
    var available=ings.filter(function(ing){
      return monthIndices.some(function(m){ return sc(ing,m)>0; });
    }).sort(function(a,b){ return catIdx(a)-catIdx(b)||a.name.localeCompare(b.name); });
    var endingSoon=ings.filter(function(ing){
      return sc(ing,curM)>0 && monthIndices.every(function(m){ return sc(ing,m)===0; });
    }).sort(function(a,b){ return catIdx(a)-catIdx(b)||a.name.localeCompare(b.name); });
    if(available.length)  sections.push({label:'Available in '+winLabel, ings:available, dotColor:'var(--olive)'});
    if(endingSoon.length) sections.push({label:'Gone before '+winLabel+' — use now', ings:endingSoon, dotColor:'var(--gold)'});
  }

  if(!sections.length){
    resEl.innerHTML='<div class="flow-empty">No data for that window yet.</div>';
    return;
  }

  // Filter pill options derive from union of all section ingredients.
  var allIngs=[];
  sections.forEach(function(s){ allIngs=allIngs.concat(s.ings); });
  var vendors = ['All'].concat(_uniq(allIngs.map(function(i){ return (i.vendor||'').trim(); })));
  var categories = ['All'].concat(_uniq(allIngs.map(function(i){ return (i.category||'').trim(); })));

  // Apply filters per section
  function pass(i){
    if(f.vendor!=='All' && (i.vendor||'').trim() !== f.vendor) return false;
    if(f.category!=='All' && (i.category||'').trim() !== f.category) return false;
    return true;
  }

  var html = _flowFilterStrip(containerId, vendors, categories, f);
  var anyShown = false;
  sections.forEach(function(s){
    var filtered = s.ings.filter(pass);
    if(!filtered.length) return;
    anyShown = true;
    html += '<div class="flow-section-hd">'+s.label+'</div>';
    html += filtered.map(function(i){ return ingRow(i, s.dotColor); }).join('');
  });
  if(!anyShown){
    html += '<div class="flow-empty">Nothing matches those filters.</div>';
  }
  resEl.innerHTML = html;
}

// ── CART RENDER ─────────────────────────────────────────────────────
function renderCart(){
  var inner=document.getElementById('cart-inner');
  var footer=document.getElementById('cart-footer');
  if(!inner) return;
  if(!cart.length){
    inner.innerHTML='<div class="cart-empty"><div class="cart-empty-title">Cart is empty</div><div class="cart-empty-sub">Mark ingredients while browsing to add them here.</div></div>';
    if(footer) footer.style.display='none';
    return;
  }
  if(footer) footer.style.display='block';
  // Group by vendor
  var vendors={};
  cart.forEach(function(item){
    var v=item.vendor||'Other';
    if(!vendors[v]) vendors[v]=[];
    vendors[v].push(item);
  });
  var html='<div class="cart-scroll">';
  Object.keys(vendors).sort().forEach(function(v){
    html+='<div class="cart-vendor-group"><div class="cart-vendor-name">'+v+'</div>';
    vendors[v].forEach(function(item){
      html+='<div class="cart-item">'+
        '<div class="cart-item-body">'+
          '<div class="cart-item-name">'+item.name+'</div>'+
          '<div class="cart-item-meta">'+(item.category||'')+'</div>'+
        '</div>'+
        '<input class="qty-input" type="text" placeholder="qty" value="'+item.quantity+'" oninput="updateQty(\''+item.name.replace(/'/g,"\\'")+'\',this.value)">'+
        '<button class="remove-btn" onclick="removeFromCart(\''+item.name.replace(/'/g,"\\'")+'\')">&#215;</button>'+
      '</div>';
    });
    html+='<button class="draft-btn" onclick="draftOutreach(\''+v.replace(/'/g,"\\'")+'\')">Draft outreach to '+v+'</button>';
    html+='</div>';
  });
  html+='</div>';
  inner.innerHTML=html;
}

function updateQty(name,val){
  var item=cart.find(function(i){ return i.name===name; });
  if(item) item.quantity=val;
  saveCart();
}
function removeFromCart(name){
  cart=cart.filter(function(i){ return i.name!==name; });
  saveCart();
  renderCart();
  document.querySelectorAll('[data-mark="'+name+'"]').forEach(function(b){
    b.classList.remove('marked');
  });
}

// ── OUTREACH ─────────────────────────────────────────────────────────
// Back-button fix: separate navigation from fetch.
// draftOutreach() navigates then fetches.
// _fetchOutreach() fetches only — used by retry button.
function draftOutreach(vendor){
  goTo('outreach');
  document.getElementById('outreach-title').textContent='Outreach';
  _fetchOutreach(vendor);
}

function _fetchOutreach(vendor){
  var workerUrl=getWorkerUrl();
  var inner=document.getElementById('outreach-inner');
  if(!workerUrl){
    inner.innerHTML='<div class="outreach-error"><div class="outreach-error-text">Worker URL not configured.</div><button class="retry-btn" onclick="openSettings()">Open Settings</button></div>';
    return;
  }
  inner.innerHTML='<div class="outreach-loading"><div style="text-align:center"><div class="outreach-spinner"></div><div class="outreach-loading-text">Drafting your outreach&hellip;</div></div></div>';
  var items=cart.filter(function(i){ return i.vendor===vendor; });
  var body=JSON.stringify({
    items:items.map(function(i){ return {name:i.name,quantity:i.quantity,notes:i.notes}; }),
    vendorName:vendor,
    vendorGreeting:VENDOR_GREET[vendor]||vendor.split(' ')[0],
    vendorContact:VENDOR_CONTACT[vendor]||'',
    voiceRules:getVoiceRules(),
  });
  fetch(workerUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:body})
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.error){ throw new Error(data.error+(data.detail?' — '+data.detail:'')); }
      var contact=VENDOR_CONTACT[vendor]||'';
      inner.innerHTML=
        '<div class="outreach-body">'+
          (contact?'<div class="outreach-contact">To: '+contact+'</div>':'')+
          '<textarea class="outreach-textarea" id="outreach-text">'+data.email+'</textarea>'+
        '</div>'+
        '<div class="outreach-actions">'+
          '<button class="copy-btn" id="copy-btn" onclick="copyOutreach()">Copy to clipboard</button>'+
        '</div>';
    })
    .catch(function(err){
      // retry calls _fetchOutreach only — no extra history push
      inner.innerHTML='<div class="outreach-error">'+
        '<div class="outreach-error-text">'+err.message+'</div>'+
        '<button class="retry-btn" onclick="_fetchOutreach(\''+vendor.replace(/'/g,"\\'")+'\')">Try again</button>'+
        '</div>';
    });
}

function copyOutreach(){
  var ta=document.getElementById('outreach-text');
  if(!ta) return;
  try{
    navigator.clipboard.writeText(ta.value).then(function(){
      var btn=document.getElementById('copy-btn');
      if(btn){ btn.textContent='Copied!'; btn.classList.add('copied'); }
      setTimeout(function(){ if(btn){ btn.textContent='Copy to clipboard'; btn.classList.remove('copied'); } },2000);
    });
  } catch(e){
    ta.select(); document.execCommand('copy');
  }
}

// ── VENDOR ALERT ─────────────────────────────────────────────────────
function showWeatherAlert(){
  goTo('market');
}

function initWeatherAlert(){
  var wa=(DATA.weather||{}).vendor_alerts||{};
  var active=Object.keys(wa).filter(function(v){
    var d=wa[v]; return d&&((d.alerts||[]).length||(d.predictions||[]).length);
  });
  if(!active.length) return;
  var el=document.getElementById('weather-alert');
  if(!el) return;
  var first=wa[active[0]];
  var note=(first.alerts&&first.alerts[0])
    ? (first.alerts[0].description||String(first.alerts[0])).slice(0,120)
    : (first.predictions&&first.predictions[0])
    ? (first.predictions[0].description||String(first.predictions[0])).slice(0,120)
    : active.join(', ');
  el.innerHTML='<div class="wa-w-label">&#9729; Weather Alert — '+active.length+
    ' vendor'+(active.length>1?'s':'')+' affected</div>'+
    '<div class="wa-w-body">'+_escHtml(note)+'</div>';
  el.classList.add('show');
}

function checkVendorAlert(){
  var coverage=(DATA.metadata||{}).vendor_coverage||{};
  if(!Object.keys(coverage).length) return;
  var EXPECTED={
    'foraged_and_found':7,'local_roots_farm':14,'farmstand_local_foods':14,
    'franks_produce':7,'key_city_fish':14,'preserve_meat':21
  };
  var today=new Date();
  var overdue=[];
  Object.keys(EXPECTED).forEach(function(k){
    var raw=coverage[k]||'';
    var dateStr=raw.split(' ')[0];
    if(!dateStr) return;
    var last=new Date(dateStr);
    if(isNaN(last.getTime())) return;
    var days=Math.floor((today-last)/86400000);
    if(days>EXPECTED[k]) overdue.push({vendor:k.replace(/_/g,' '),days:days,expected:EXPECTED[k]});
  });
  if(!overdue.length) return;
  var el=document.getElementById('vendor-alert');
  if(!el) return;
  var names=overdue.map(function(o){ return o.vendor; });
  el.classList.add('show');
  el.innerHTML='<div class="va-label">Vendor Alert</div>'+
    '<div class="va-body">'+names.join(', ')+' '+(names.length===1?'is':'are')+' overdue for a fresh sheet.</div>';
}

// ── FULL VIEW ─────────────────────────────────────────────────────────
var _fvIngs=[];
function buildFullView(ings){
  _fvIngs=ings.slice().sort(function(a,b){
    return catIdx(a)-catIdx(b)||a.name.localeCompare(b.name);
  });
  var prev2=MONTHS[(curM+10)%12], prev1=MONTHS[prevM], curr=MONTHS[curM];
  var mHd=document.getElementById('fv-months');
  if(mHd) mHd.innerHTML='<div class="fv-ml">Ingredient</div>'+
    '<div class="fv-ml">'+prev2+'</div>'+
    '<div class="fv-ml">'+prev1+'</div>'+
    '<div class="fv-ml now">'+curr+'</div>';
  filterFV('');
}
function filterFV(q){
  var el=document.getElementById('fv-rows'); if(!el) return;
  var filtered=q?_fvIngs.filter(function(i){ return i.name.toLowerCase().indexOf(q.toLowerCase())>=0; }):_fvIngs;
  var m2=(curM+10)%12, m1=prevM;
  el.innerHTML=filtered.map(function(i){
    function cell(m){ var s=sc(i,m); return '<div class="fv-cell fv-c'+s+'"><div class="fv-dot"></div></div>'; }
    return '<div class="fv-row"><div class="fv-rn">'+i.name+'</div>'+cell(m2)+cell(m1)+cell(curM)+'</div>';
  }).join('');
}
function openFullView(){ document.getElementById('full-view').classList.add('open'); }
function closeFullView(){ document.getElementById('full-view').classList.remove('open'); }

// ── NAVIGATION ────────────────────────────────────────────────────────
var screenHistory=[];
function clearLeavingScreen(id){
  // wipe transient content so it can't bleed if the user re-enters via back-stack
  if(id==='outreach'){
    var oi=document.getElementById('outreach-inner');
    if(oi) oi.innerHTML='';
  }
  if(id==='shorted'){
    // reset only when navigating away (entry path resets independently)
    var si=document.getElementById('shorted-input');
    if(si) si.value='';
    var sr=document.getElementById('shorted-results');
    if(sr) sr.innerHTML='<div class="empty-msg" style="padding-top:32px">Start typing to find alternatives.</div>';
  }
}
function goTo(id){
  var leaving=screenHistory.length?screenHistory[screenHistory.length-1]:null;
  document.querySelectorAll('.ss').forEach(function(s){ s.classList.remove('active'); });
  var el=document.getElementById('screen-'+id);
  if(el){ el.classList.add('active'); screenHistory.push(id); }
  if(leaving && leaving!==id) clearLeavingScreen(leaving);
  if(id==='cart') renderCart();
}
function goBack(){
  var leaving=screenHistory.length?screenHistory[screenHistory.length-1]:null;
  document.querySelectorAll('.ss').forEach(function(s){ s.classList.remove('active'); });
  screenHistory.pop();
  if(screenHistory.length){
    var prev=screenHistory[screenHistory.length-1];
    var el=document.getElementById('screen-'+prev);
    if(el) el.classList.add('active');
    if(prev==='cart') renderCart();
  }
  if(leaving) clearLeavingScreen(leaving);
}

(function init(){
  buildTrendMap();

  var ings=DATA.ingredients||[];
  _browse.arriving=sortArriving(ings.filter(isArriving));
  _browse.peak=sortPeak(ings.filter(isPeak));
  _browse.ending=sortEnding(ings.filter(function(i){ return isEnding(i)&&!isArriving(i); }));

  buildPills('arriving-pills','arriving-list',_browse.arriving,'var(--olive)');
  buildPills('peak-pills','peak-list',_browse.peak,'var(--terra)');
  buildPills('ending-pills','ending-list',_browse.ending,'var(--gold)');
  buildPrices();
  buildMarket();
  buildFullView(ings);
  buildPortal();
  checkVendorAlert();
  initWeatherAlert();

  // Intro → portal: continuous shrink-to-header morph.
  // Big REMY fades in at center, holds briefly, then morphs (translate + scale)
  // to the exact header REMY position, where the header element takes over.
  runIntroMorph();
})();

function runIntroMorph(){
  var word = document.querySelector('.intro-word');
  var headerRemy = document.querySelector('.ph-remy');
  var headerBrand = document.querySelector('.ph-brand');
  var intro = document.getElementById('intro');
  if(!word || !headerRemy || !intro){
    // Safety: if anything is missing, just hide the overlay so the app is usable
    if(intro) intro.classList.add('gone');
    return;
  }
  // Wait for header to be laid out so getBoundingClientRect is correct
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      var hr = headerRemy.getBoundingClientRect();
      var wr = word.getBoundingClientRect();
      // Both share the same letter-spacing/text-transform, so widths/heights
      // scale proportionally. Use height as the scale anchor.
      var scale = hr.height / wr.height;
      var tx = (hr.left + hr.width/2) - (wr.left + wr.width/2);
      var ty = (hr.top + hr.height/2) - (wr.top + wr.height/2);

      // Phase 1: hold center for ~1150ms — longer linger before transformation
      //          (intro opacity fade-in completes at ~0.65s, then ~500ms of presence)
      // Phase 2: morph for 950ms (matches CSS transition duration)
      // Phase 3: at end of morph, reveal header REMY + brand, fade overlay out
      setTimeout(function(){
        word.classList.add('morph');
        // Force a reflow so the browser registers the .morph class (with its
        // transition rule) BEFORE the inline transform change. Without this,
        // Safari sometimes treats the transform write as initial-state and
        // skips the transition — which is what made the shrink feel like a pop.
        void word.offsetHeight;
        word.style.transform = 'translate('+tx+'px, '+ty+'px) scale('+scale+')';
        // Same idea for the glow: shrink the text-shadow as it lands
        word.classList.add('landed');
      }, 1150);

      setTimeout(function(){
        // Reveal the real header REMY at the exact spot the morph lands
        headerRemy.classList.add('in');
      }, 2030);

      setTimeout(function(){
        // San Fermo brand fades in alongside, just after REMY settles
        if(headerBrand) headerBrand.classList.add('in');
        // Fade the overlay (which contains the morphed intro word) so the
        // header REMY underneath is what stays visible
        intro.classList.add('gone');
      }, 2120);
    });
  });
}
